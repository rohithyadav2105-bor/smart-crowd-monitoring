<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Crowd Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

.card {
    border-radius: 15px;
    padding: 20px;
    text-align: center;
}

.stat {
    font-size: 30px;
    font-weight: bold;
}
</style>
</head>

<body class="p-4">

<h2 class="text-center mb-4">🚨 Smart Crowd Monitoring</h2>

<!-- BUTTON MENU -->
<div class="text-center mb-4">
    <button class="btn btn-light m-1" onclick="showSection('stats')">📊 Stats</button>
    <button class="btn btn-warning m-1" onclick="showSection('alert')">🚨 Alert</button>
    <button class="btn btn-info m-1" onclick="showSection('graph')">📈 Graph</button>
</div>

<!-- ===================== STATS SECTION ===================== -->
<div id="stats" class="section active">

    <!-- UPLOAD -->
    <div class="text-center mb-4">
        <form id="uploadForm">
            <input type="file" name="file" required class="form-control w-50 mx-auto mb-2">
            <button class="btn btn-warning">Upload Video</button>
        </form>
    </div>

    <!-- STATS CARDS -->
    <div class="row text-center">

        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <h5>👥 Total</h5>
                <div id="total" class="stat">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white">
                <h5>⬇ Entry</h5>
                <div id="entry" class="stat">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white">
                <h5>⬆ Exit</h5>
                <div id="exit" class="stat">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-info text-white">
                <h5>🏠 Inside</h5>
                <div id="inside" class="stat">0</div>
            </div>
        </div>

    </div>

    <!-- VIDEO -->
    <div class="text-center mt-4">
        <img src="/video_feed" width="500" height="300" class="rounded shadow">
    </div>

</div>

<!-- ===================== ALERT SECTION ===================== -->
<div id="alert" class="section text-center">
    <h3>🚨 Alert History </h3>
    <div id="alertContainer" class="row mt-3"></div>
</div>

<!-- ===================== GRAPH SECTION ===================== -->
<div id="graph" class="section text-center">
    <h3>📊 Crowd Analysis</h3>
    <canvas id="myChart" width="400" height="120"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// SWITCH SECTIONS (FIXED)
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');

    if (id === 'alert') {
        loadAlerts();
    }
}

// FETCH STATS
setInterval(() => {
    fetch('/stats')
    .then(res => res.json())
    .then(data => {
        document.getElementById("total").innerText = data.total;
        document.getElementById("entry").innerText = data.entry;
        document.getElementById("exit").innerText = data.exit;
        document.getElementById("inside").innerText = data.inside;

        // UPDATE GRAPH
        chart.data.labels = data.history.time;
        chart.data.datasets[0].data = data.history.inside;
        chart.update();
    });
}, 1000);

// UPLOAD VIDEO
document.getElementById("uploadForm").onsubmit = function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}

// LOAD ALERTS
function loadAlerts() {
    fetch('/alerts')
    .then(res => res.json())
    .then(files => {

        let container = document.getElementById("alertContainer");
        container.innerHTML = "";

        files.forEach(file => {

            let name = file.replace("alert_", "").replace(".png", "");
            let date = name.substring(0,8);
            let time = name.substring(9);

            let formatted =
                date.substring(0,4) + "-" +
                date.substring(4,6) + "-" +
                date.substring(6,8) + " " +
                time.substring(0,2) + ":" +
                time.substring(2,4) + ":" +
                time.substring(4,6);

            container.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card p-2 bg-dark text-white">
                        <img src="/uploads/${file}" width="100%" class="rounded">
                        <small>${formatted}</small>
                    </div>
                </div>
            `;
        });
    });
}

// CHART
let ctx = document.getElementById('myChart').getContext('2d');
let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'People Inside',
            data: [],
            borderWidth: 2
        }]
    }
});
</script>

</body>
</html>
